# Kafka and topics
KAFKA_BOOTSTRAP=kafka:9092
KAFKA_GROUP_ID=exp-group-run-20260515t122252z-1778847772533-s200000
BEHAVIOR_TOPIC=exp-behavior-run-20260515t122252z-1778847772533-s200000
RULE_TOPIC=exp-rules-run-20260515t122252z-1778847772533-s200000
ALERT_TOPIC=exp-alerts-run-20260515t122252z-1778847772533-s200000

# Flink runtime
PARALLELISM=4
ENABLE_KAFKA_SINK=true

# Debug (print to TaskManager logs)
DEBUG_MATCHED_PRINT=true
DEBUG_ALERT_PRINT=true

# State backend: hashmap | rocksdb
STATE_BACKEND=rocksdb

# Checkpoint tuning
CHECKPOINT_INTERVAL_MS=60000
CHECKPOINT_TIMEOUT_MS=120000
CHECKPOINT_MIN_PAUSE_MS=30000
CHECKPOINT_MAX_CONCURRENT=1
CHECKPOINT_TOLERABLE_FAILURES=3
CHECKPOINT_UNALIGNED_ENABLED=false
CHECKPOINT_EXTERNALIZED_RETAINED=true

# Optional checkpoint storage URI
# e.g. file:///workspace/flink-checkpoints
CHECKPOINT_STORAGE=
